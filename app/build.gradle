apply plugin: 'com.android.application'

android {
    namespace 'com.ghost.v4'
    compileSdk 33

    defaultConfig {
        applicationId "com.ghost.v4"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-nearby:19.0.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
